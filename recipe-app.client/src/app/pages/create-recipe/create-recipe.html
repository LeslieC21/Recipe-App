<div class="container">
  <header>
    <h1>Upload A Recipe</h1>
  </header>
  <main>
    <form>
      <div class="form_group">
        <input type="text" placeholder="Recipe Name" [formField]="recipeForm.recipeName" />
      </div>

      <div class="form_group">
        <div class="form_group-title">
          <label for="file-input">Upload Recipe Image</label>
          <label for="file-input" class="custom-file-upload">Choose File</label>
          <input type="file" id="file-input" accept=".jpg, .jpeg, .png, .webp, .svg" class="form_group-file" (change)="onFileSelected($event)"/>
        </div>
        <p class="form_group-file-text" (click)="onFileRemove()"> × {{ (recipeForm.recipeImage().value())?.name ?? 'No File Selected...' }}</p>
      </div>

      <div class="form_group">
        <div class="form_group-title">
          <label for="stepCounter">How many steps in this recipe?</label>
        </div>
        <input type="number" id="stepCounter" (change)="addSteps()" [formField]="recipeForm.recipeTotalSteps" oninput="if (this.value < 0) this.value = 0;" />
        @for(step of recipeForm.recipeSteps; track $index) {
        <textarea (change)="updateSteps($index, $event)" placeholder="Step {{$index + 1}} Instructions"></textarea>
        }
      </div>

      <div class="form_group">
        <div class="form_group-title">
          <label for="tagCounter">How many tags does this recipe have?</label>
          <button>Add A New Tag</button>
        </div>
        <input type="number" id="tagCounter" (change)="addTags()" [formField]="recipeForm.recipeTotalTags" oninput="if (this.value < 0) this.value = 0;" />
        @for(step of recipeForm.recipeTags; track $index) {
        <label class="typeCounter">Tag {{$index + 1}}</label>
        <select (change)="updateTags($index, $event)">
          <option value="" disabled selected hidden>Select A Tag...</option>
          @for(tag of tags(); track tag.tagId) {
          <option value="{{ tag.tagId }}">{{ tag.name | capitalize }}</option>
          }
        </select>
        }
      </div>

      <div class="form_group">
        <div class="form_group-title">
          <label for="ingredientCounter">How Many Ingredients in this recipe?</label>
          <button>Add New Ingredient</button>
        </div>
        <input type="number" id="ingredientCounter" (change)="addIngredients()" [formField]="recipeForm.recipeTotalIngredients" oninput="if (this.value < 0) this.value = 0;" />
        @for(step of recipeForm.recipeIngredients; track $index) {
        <label class="typeCounter">Ingredient {{$index + 1}}</label>
        <div class="form_ingredient">
          <select (change)="updateIngredientID($index, $event)">
            <option value="" disabled selected hidden>Select An Ingredient...</option>
            @for(ingredient of ingredients(); track $index) {
            <option value="{{ ingredient.ingredientId }}"> {{ ingredient.name | capitalize }}</option>
            }
          </select>
          <input (change)="updateIngredientQuantity($index, $event)" type="number" placeholder="Measurement" />
          <select (change)="updateIngredientUnit($index, $event)">
            <option value="" disabled selected hidden>Select A Unit...</option>
            @for(unit of this.units(); track unit.unitId) {
            <option value="{{ unit.unitId }}">{{ unit.name | capitalize }} ({{ unit.abbreviation }})</option>
            }
          </select>
        </div>
        }
      </div>
      <button class="form_submit-button" (click)="submitRecipeForm($event)">Submit</button>
    </form>
  </main>
</div>
